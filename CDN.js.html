<script type="module">
  /*
   * 使用在线CDN
   */
  import{CDN}from"https://sundawning.github.io/CDN.js";
  let cdn=new CDN();
  let Toast=await cdn.import("./Toast.js");
  Toast.success("拼");
  /*
   * 使用本地CDN
   */
  let cdn2=new CDN({
    uri:window.location.href,
  });
  let Toast2=await cdn2.import("./Toast.js");
  Toast2.success("音");

  import{CDN as CDN3}from"./CDN.js";
  let cdn3=new CDN3("https://sundawning.github.io");
  let Toast3=await cdn3.import("./Toast.js");
  Toast3.success("开");
</script>
